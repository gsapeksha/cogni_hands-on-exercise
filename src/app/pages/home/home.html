<h2>Data Binding Demo</h2>

<h3>Interpolation</h3>
<p>Student Name: {{ studentName }}</p>
<p>First Course: {{ courses[0] }}</p>

<hr>

<h3>Property Binding</h3>
<button [disabled]="isDisabled">
  Submit
</button>

<hr>

<h3>Event Binding</h3>

<p>Count: {{ count }}</p>

<button (click)="increaseCount()">
  Increase Count
</button>

<h3>*ngIf Demo</h3>

<p *ngIf="showMessage">
  Welcome to Angular Directives!
</p>

<h3>*ngFor Demo</h3>

<ul>
  <li *ngFor="let course of courses">
    {{ course }}
  </li>
</ul>
