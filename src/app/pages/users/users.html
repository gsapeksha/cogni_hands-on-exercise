<h2>Users from API</h2>

<input
  type="text"
  [(ngModel)]="searchText"
  placeholder="Search User">

<br><br>

<ul>

  <div *ngFor="let user of users">

  <div *ngIf="
    user.name.toLowerCase().includes(
    searchText.toLowerCase())">

    <strong>{{ user.name }}</strong>

    <br>

    {{ user.email }}

    <hr>

  </div>

</div>

</ul>
